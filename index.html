<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro-Botanist</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="start-screen" class="fullscreen-overlay">
        <h1>Astro-Botanist</h1>
        <p class="subtitle">Bring dead worlds back to life.</p>
        <button id="start-btn">BEGIN EXPEDITION</button>
    </div>

    <div id="hud" style="opacity: 0; pointer-events: none;">
        <div class="panel">
            <h2>Ecosystem</h2>
            <div class="bar-bg"><div id="eco-bar" class="bar-fill green-fill"></div></div>
            <p id="eco-text">0%</p>
        </div>

        <div class="panel">
            <h2>Water Supply</h2>
            <div class="bar-bg"><div id="water-bar" class="bar-fill blue-fill"></div></div>
            <p id="water-text">30 / 100</p>
        </div>

        <div class="controls-hint">
            <p><strong>W A S D</strong> to fly</p>
            <p><strong>SPACE</strong> to plant (Costs 10 Water)</p>
            <p>Fly into <strong>Blue Orbs</strong> to collect Water</p>
        </div>
    </div>
    
    <div id="win-screen" class="fullscreen-overlay" style="opacity: 0; pointer-events: none;">
        <h1>PLANET RESTORED</h1>
        <p>The atmosphere is stable. Life has returned.</p>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
