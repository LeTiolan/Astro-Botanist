<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro-Botanist V2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <h1>Astro-Botanist</h1>
        <p><strong>Click canvas</strong> to start audio.</p>
        <p><strong>W / S / A / D</strong> to orbit.</p>
        <hr style="border-color: #333; margin: 10px 0;">
        <p><strong>1</strong>: Equip Seeds (Spacebar to plant)</p>
        <p><strong>2</strong>: Equip Water (Spacebar to hydrate soil)</p>
        <p><strong>3</strong>: Equip Gas (Spacebar to build atmosphere)</p>
        <p style="color: #4ade80; margin-top: 10px;" id="current-tool">Current Tool: SEEDS</p>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
